<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧾 Espace Caissier — Petit Délices</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #1B5E6E;
      --teal-dark: #134752;
      --gold: #D4A055;
      --gold-dark: #B8843E;
      --cream: #F5E6C8;
      --bg: #FAFAF7;
      --text: #2C2C2C;
      --muted: #8A8A8A;
      --vert: #4CAF7D;
      --rouge: #D9534F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    /* ✅ HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 14px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .entete-logo { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .entete-logo img {
      width: 42px; height: 42px;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      padding: 4px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .entete-texte { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
    .entete-texte .nom-marque { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; white-space: nowrap; }
    .entete-texte .role-espace { font-size: 11px; color: var(--cream); text-transform: uppercase; letter-spacing: 0.5px; }

    .user-info { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .user-info span { font-size: 13px; opacity: 0.92; white-space: nowrap; }

    .btn-deco {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-deco:hover { background: rgba(217,83,79,0.85); }

    /* ✅ CONTENU */
    main { max-width: 1400px; margin: 0 auto; padding: 28px 20px 60px; }
    main h1 { color: var(--teal-dark); margin-bottom: 20px; font-size: 26px; }

    /* ✅ STATS */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(27,94,110,0.07);
      text-align: center;
      border-top: 4px solid var(--teal);
    }
    .stat-card:nth-child(1) { border-top-color: var(--gold); }
    .stat-card:nth-child(2) { border-top-color: var(--teal); }
    .stat-card:nth-child(3) { border-top-color: var(--vert); }
    .stat-card:nth-child(4) { border-top-color: var(--teal-dark); }
    .stat-card .nombre { font-size: 30px; font-weight: 700; color: var(--teal-dark); }
    .stat-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ✅ RECHERCHE & FILTRES */
    .search-bar {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(27,94,110,0.07);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1.5px solid var(--cream);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .search-bar input:focus { outline: none; border-color: var(--gold); }

    .filtres { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-filtre {
      background: white;
      border: 1.5px solid var(--cream);
      color: var(--teal-dark);
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Lato', sans-serif;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-filtre:hover { background: var(--cream); }
    .btn-filtre.actif-filtre {
      background: var(--gold);
      color: white;
      border-color: var(--gold);
    }

    /* ✅ CARTES COMMANDE */
    .grille-commandes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .carte-commande {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(27,94,110,0.07);
      border-left: 5px solid var(--teal);
      display: flex;
      flex-direction: column;
    }
    .carte-commande.urgence { border-left-color: var(--gold); }
    .carte-commande.prete { border-left-color: var(--vert); }

    .commande-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
    .commande-header h3 { font-size: 16px; color: var(--text); margin: 4px 0 4px 0; font-family: 'Lato', sans-serif; font-weight: 700; }
    .commande-tel { font-size: 13px; color: var(--muted); }
    .commande-id { font-size: 12px; color: var(--muted); }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.orange { background: rgba(212,160,85,0.2); color: var(--gold-dark); }
    .badge.bleu   { background: rgba(27,94,110,0.12); color: var(--teal); }
    .badge.vert   { background: rgba(76,175,125,0.15); color: #1f7a4d; }
    .badge.gris   { background: rgba(138,138,138,0.15); color: var(--muted); }
    .badge.rouge  { background: rgba(217,83,79,0.15); color: var(--rouge); }

    .commande-produits {
      list-style: none;
      margin: 12px 0;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 13px;
    }
    .commande-produits li { padding: 4px 0; display: flex; justify-content: space-between; gap: 8px; }

    .commande-notes {
      display: block;
      font-size: 12px;
      color: var(--gold-dark);
      background: rgba(212,160,85,0.15);
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 8px;
    }

    .info-tracabilite { font-size: 12px; margin-top: 6px; font-style: italic; }

    .commande-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--cream);
    }
    .commande-total { font-size: 18px; font-weight: 700; color: var(--teal-dark); }
    .commande-date { font-size: 12px; color: var(--muted); }

    .commande-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-action {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Lato', sans-serif;
      color: white;
    }
    .btn-valider  { background: var(--vert); }
    .btn-valider:hover { background: #3d9468; }
    .btn-suivant  { background: var(--teal); }
    .btn-suivant:hover { background: var(--teal-dark); }
    .btn-remettre { background: var(--gold); }
    .btn-remettre:hover { background: var(--gold-dark); }

    .texte-info  { color: var(--teal); font-size: 13px; text-align: center; flex: 1; }
    .texte-fin   { color: #1f7a4d; font-size: 13px; text-align: center; flex: 1; }
    .texte-annule{ color: var(--rouge); font-size: 13px; text-align: center; flex: 1; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* ✅ RESPONSIVE */
    @media (max-width: 900px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      header { padding: 12px 16px; }
      .entete-texte .nom-marque { font-size: 16px; }
      main { padding: 20px 14px 50px; }
      .search-bar { flex-direction: column; align-items: stretch; }
      .filtres { width: 100%; }
    }

    @media (max-width: 420px) {
      .stats-bar { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-card .nombre { font-size: 24px; }
      .user-info span { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="entete-logo">
      <img src="./images/logo.png" alt="Logo Petit Délices">
      <div class="entete-texte">
        <span class="nom-marque">Petit Délices</span>
        <span class="role-espace">Espace Caissier</span>
      </div>
    </div>
    <div class="user-info">
      <span id="caissier-nom">Chargement...</span>
      <button class="btn-deco" onclick="seDeconnecter()">🚪 Déconnexion</button>
    </div>
  </header>

  <main>
    <h1>🧾 Espace Caissier</h1>
    <div class="stats-bar">
      <div class="stat-card">
        <div class="nombre" id="stat-en-attente">0</div>
        <div class="label">⏳ En attente</div>
      </div>
      <div class="stat-card">
        <div class="nombre" id="stat-preparation">0</div>
        <div class="label">👨‍🍳 En préparation</div>
      </div>
      <div class="stat-card">
        <div class="nombre" id="stat-prete">0</div>
        <div class="label">✅ Prêtes à retirer</div>
      </div>
      <div class="stat-card">
        <div class="nombre" id="stat-ca">0</div>
        <div class="label">💰 CA du jour (DH)</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Rechercher..." onkeyup="filtrerCommandes()">
      <div class="filtres">
        <button class="btn-filtre actif-filtre" onclick="filtrerStatut('tous', this)">Toutes</button>
        <button class="btn-filtre" onclick="filtrerStatut('En attente', this)">⏳ En attente</button>
        <button class="btn-filtre" onclick="filtrerStatut('En préparation', this)">👨‍🍳 Préparation</button>
        <button class="btn-filtre" onclick="filtrerStatut('Prêt', this)">✅ Prêtes</button>
      </div>
    </div>

    <div id="liste-commandes" class="grille-commandes"></div>
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="config.js"></script>

  <script>
    // Utiliser les variables globales de config.js
    const API = window.API;
    const socket = window.socket;
    let userCaissier = JSON.parse(sessionStorage.getItem("user"))

    if (!userCaissier || !["caissier", "admin"].includes(userCaissier.role)) {
      window.location.href = "login.html"
    }

    let toutesLesCommandes = []
    let statutFiltre = "tous"

    socket.on("rafraichir_commandes", () => {
      chargerCommandes()
    })

    document.getElementById("caissier-nom").textContent = `👋 ${userCaissier.nom}`
    chargerCommandes()

    async function chargerCommandes() {
      try {
        const res = await fetch(API + "/commandes")
        let data = await res.json()

        if (!Array.isArray(data)) return

        toutesLesCommandes = data
        afficherCommandes()
        mettreAJourStats()
      } catch (err) {
        console.error("Erreur:", err)
      }
    }

    function afficherCommandes() {
      const liste = document.getElementById("liste-commandes")
      const terme = document.getElementById("search-input").value.toLowerCase()

      let commandesFiltrees = toutesLesCommandes.filter(cmd => {
        const matchStatut = statutFiltre === "tous" || cmd.statut === statutFiltre
        const clientNom = (cmd.client || "").toLowerCase()
        const tel = cmd.telephone || ""
        const matchRecherche = !terme || clientNom.includes(terme) || tel.includes(terme) || String(cmd.id).includes(terme)
        return matchStatut && matchRecherche
      })

      if (commandesFiltrees.length === 0) {
        liste.innerHTML = `<div class="empty-state" style="grid-column: 1/-1"><h3>Aucune commande</h3></div>`
        return
      }

      liste.innerHTML = commandesFiltrees.map(cmd => {
        const total = cmd.produits ? cmd.produits.reduce((s, p) => s + Number(p.prix) * Number(p.quantite), 0) : 0

        const couleurs = {
          "En attente": "orange",
          "En préparation": "bleu",
          "Prêt": "vert",
          "Livrée": "gris",
          "Livré": "gris",
          "Annulée": "rouge"
        }

        let statutAffiche = cmd.statut
        if (statutAffiche.toLowerCase().startsWith("livr")) statutAffiche = "Livrée"

        const couleur = couleurs[statutAffiche] || "orange"
        const produitsList = cmd.produits ? cmd.produits.map(p => `<li><span>${p.nom} × ${p.quantite}</span><strong>${Number(p.prix) * Number(p.quantite)} DH</strong></li>`).join("") : "<li>Aucun produit</li>"

        let classeCarte = ""
        if (cmd.statut === "En attente") classeCarte = "urgence"
        else if (cmd.statut === "Prêt") classeCarte = "prete"

        let labelOrigine = cmd.origine === "admin"
          ? `<span class="badge bleu" style="margin-bottom:8px; display:inline-block;">👨‍🍳 Créée pour le Chef</span>`
          : `<span class="badge orange" style="margin-bottom:8px; display:inline-block;">🧾 Créée pour le Caissier</span>`

        // Traçabilité : on n'affiche que ce qui existe réellement (pas de placeholder de debug)
        let infoTraçabilité = ""
        if (cmd.pris_par_chef) {
          infoTraçabilité += `<div class="info-tracabilite" style="color:var(--teal)">👨‍🍳 Préparée par : <strong>${cmd.pris_par_chef}</strong></div>`
        }
        if (cmd.livre_par) {
          infoTraçabilité += `<div class="info-tracabilite" style="color:#1f7a4d">✅ Remise/livrée par : <strong>${cmd.livre_par}</strong></div>`
        }

        let boutons = ""
        const estLivree = (cmd.statut || "").toLowerCase().startsWith("livr")

        if (cmd.origine === "client") {
          if (cmd.statut === "En attente") {
            boutons = `<button class="btn-action btn-valider" onclick="changerStatutCaissier(${cmd.id}, 'En préparation')">✅ Valider et envoyer en cuisine</button>`
          } else if (cmd.statut === "En préparation") {
            boutons = `<button class="btn-action btn-suivant" onclick="changerStatutCaissier(${cmd.id}, 'Prêt')">➡️ Marquer comme Prêt</button>`
          } else if (cmd.statut === "Prêt") {
            if (cmd.livraison === "domicile") {
              boutons = `<span class="texte-info">🚚 En attente du livreur</span>`
            } else {
              boutons = `<button class="btn-action btn-remettre" onclick="marquerRemise(${cmd.id})">🔑 Remise au client (Code)</button>`
            }
          } else if (estLivree) {
            boutons = `<span class="texte-fin">✅ Commande finalisée</span>`
          } else if (cmd.statut === "Annulée") {
            boutons = `<span class="texte-annule">❌ Annulée</span>`
          }
        } else if (cmd.origine === "admin") {
          if (cmd.statut === "En préparation") {
            boutons = `<span class="texte-info">👨‍🍳 En préparation par le chef...</span>`
          } else if (cmd.statut === "Prêt") {
            if (cmd.livraison === "domicile") {
              boutons = `<span class="texte-info">🚚 En attente du livreur</span>`
            } else {
              boutons = `<button class="btn-action btn-remettre" onclick="marquerRemise(${cmd.id})">🔑 Remise au client (Code)</button>`
            }
          } else if (estLivree) {
            boutons = `<span class="texte-fin">✅ Commande finalisée</span>`
          } else if (cmd.statut === "Annulée") {
            boutons = `<span class="texte-annule">❌ Annulée</span>`
          }
        }

        let dateAffichee = cmd.date ? new Date(cmd.date).toLocaleDateString('fr-FR') : new Date(cmd.created_at).toLocaleDateString('fr-FR')

        return `
          <div class="carte-commande ${classeCarte}">
            <div class="commande-header">
              <div>
                <div class="commande-id">#${cmd.id}</div>
                ${labelOrigine}
                <h3>👤 ${cmd.client}</h3>
                <div class="commande-tel">📞 ${cmd.telephone || "Non renseigné"}</div>
              </div>
              <span class="badge ${couleur}">${statutAffiche}</span>
            </div>
            <ul class="commande-produits">${produitsList}</ul>
            ${cmd.notes ? `<span class="commande-notes">📝 ${cmd.notes}</span>` : ""}

            ${infoTraçabilité}

            <div class="commande-footer">
              <span class="commande-date">📅 ${dateAffichee}</span>
              <span class="commande-total">${total} DH</span>
            </div>
            <div class="commande-actions">${boutons}</div>
          </div>
        `
      }).join("")
    }

    function mettreAJourStats() {
      const enAttente = toutesLesCommandes.filter(c => c.statut === "En attente").length
      const enPrep = toutesLesCommandes.filter(c => c.statut === "En préparation").length
      const pretes = toutesLesCommandes.filter(c => c.statut === "Prêt").length

      const aujourdhui = new Date().toISOString().split('T')[0]
      const caJour = toutesLesCommandes
        .filter(c => new Date(c.created_at).toISOString().split('T')[0] === aujourdhui && c.statut !== "Annulée")
        .reduce((sum, c) => {
          const total = c.produits ? c.produits.reduce((s, p) => s + Number(p.prix) * Number(p.quantite), 0) : 0
          return sum + total
        }, 0)

      document.getElementById("stat-en-attente").textContent = enAttente
      document.getElementById("stat-preparation").textContent = enPrep
      document.getElementById("stat-prete").textContent = pretes
      document.getElementById("stat-ca").textContent = caJour.toFixed(0)
    }

    function filtrerStatut(statut, btn) {
      statutFiltre = statut
      document.querySelectorAll(".btn-filtre").forEach(b => b.classList.remove("actif-filtre"))
      btn.classList.add("actif-filtre")
      afficherCommandes()
    }

    function filtrerCommandes() {
      afficherCommandes()
    }

    async function changerStatutCaissier(id, nouveauStatut) {
      if (!confirm(`Passer au statut "${nouveauStatut}" ?`)) return

      let nomCaissier = userCaissier ? userCaissier.nom : "Inconnu"

      try {
        let response = await fetch(API + "/commandes/" + id + "/statut", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ statut: nouveauStatut, utilisateur_nom: nomCaissier })
        })

        let result = await response.json()
        if (!response.ok) {
          alert("❌ " + result.erreur)
        } else {
          alert("✅ Statut mis à jour !")
          socket.emit("changement_statut")
          chargerCommandes()
        }
      } catch (err) {
        alert("Erreur : " + err.message)
      }
    }

    async function marquerRemise(id) {
      let codeSaisi = prompt("🔒 Entrez le code de confirmation à 6 chiffres :");

      if (codeSaisi === null) return;
      if (codeSaisi.length !== 6 || isNaN(codeSaisi)) {
        alert("❌ Le code doit contenir exactement 6 chiffres.");
        return;
      }

      let nomCaissier = userCaissier ? userCaissier.nom : "Inconnu"

      try {
        let response = await fetch(API + "/commandes/" + id + "/statut", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            statut: "Livrée",
            code_confirmation: codeSaisi,
            utilisateur_nom: nomCaissier
          })
        })

        let result = await response.json();

        if (!response.ok) {
          alert(result.erreur);
          return;
        }

        alert("✅ " + result.message);
        socket.emit("changement_statut")
        chargerCommandes()
      } catch (err) {
        alert("Erreur : " + err.message)
      }
    }

    function seDeconnecter() {
      sessionStorage.removeItem("user")
      window.location.href = "login.html"
    }
  </script>

</body>
</html>
