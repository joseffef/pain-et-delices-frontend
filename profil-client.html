<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil — Petit Délice</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #1B5E6E;
      --teal-light:  #2A7A8E;
      --teal-dark:   #0D3A46;
      --gold:        #D4A055;
      --gold-light:  #E8B86D;
      --cream:       #F5E6C8;
      --bg:          #FAFAF7;
      --text:        #2C2C2C;
      --text-muted:  #6B6B6B;
      --white:       #FFFFFF;
      --border:      #E8E0D0;
      --shadow:      0 4px 20px rgba(27,94,110,0.10);
      --shadow-hover:0 12px 36px rgba(27,94,110,0.20);
      --radius:      14px;
      --radius-sm:   8px;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-area img { height: 48px; width: 48px; object-fit: contain; }

    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-text .name {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: var(--teal);
    }
    .logo-text .tagline {
      font-size: 11px; color: var(--gold); font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    nav { display: flex; gap: 8px; align-items: center; }

    nav a, nav button {
      font-size: 14px; font-weight: 700; color: var(--text-muted);
      text-decoration: none; padding: 8px 14px; border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      background: transparent; border: none; cursor: pointer;
      font-family: 'Lato', sans-serif;
    }

    nav a:hover, nav button:hover { color: var(--teal); background: var(--cream); }

    .btn-logout {
      border: 2px solid var(--border) !important;
      color: var(--text-muted) !important;
    }
    .btn-logout:hover { border-color: var(--teal) !important; color: var(--teal) !important; background: transparent !important; }

    /* ── MAIN LAYOUT ── */
    main { max-width: 820px; margin: 0 auto; padding: 36px 24px 60px; }

    /* ── PROFIL HEADER ── */
    .profil-header {
      background: linear-gradient(135deg, var(--teal-dark), var(--teal));
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    .profil-header::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .avatar-grand {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: rgba(212,160,85,0.2);
      border: 3px solid var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      position: relative;
    }

    .profil-nom { position: relative; }
    .profil-nom h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 700; margin-bottom: 4px; color: var(--white);
    }
    .profil-nom p { font-size: 14px; opacity: 0.8; }

    .badge-client {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(212,160,85,0.25);
      border: 1px solid rgba(212,160,85,0.5);
      color: var(--gold-light);
      padding: 4px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
      margin-top: 8px;
    }

    /* ── SECTION CARDS ── */
    .section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: var(--teal);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--cream);
      display: flex; align-items: center; gap: 8px;
    }

    .form-groupe { margin-bottom: 16px; }
    .form-groupe label {
      display: block; margin-bottom: 6px;
      font-size: 13px; font-weight: 700; color: var(--text-muted);
    }
    .form-groupe input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Lato', sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .form-groupe input:focus { outline: none; border-color: var(--teal); }
    .form-groupe input.input-disabled { background: #F0F0EC; color: var(--text-muted); cursor: not-allowed; }

    .form-ligne { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .sous-section {
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .sous-section-title {
      font-size: 14px; font-weight: 700; color: var(--text-muted);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-sauvegarder {
      background: var(--gold);
      color: var(--white);
      border: none;
      padding: 14px 28px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      transition: background 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 6px;
    }
    .btn-sauvegarder:hover { background: var(--gold-light); }

    .succes {
      background: #d4edda;
      color: #155724;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
      display: none;
    }

    /* ── HISTORIQUE COMMANDES ── */
    .carte-commande-client {
      border: 2px solid var(--border);
      border-left: 4px solid var(--teal);
      border-radius: var(--radius-sm);
      padding: 18px;
      margin-bottom: 14px;
      transition: box-shadow 0.2s;
    }
    .carte-commande-client:hover { box-shadow: var(--shadow); }

    .commande-client-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .commande-client-header strong {
      font-family: 'Playfair Display', serif;
      font-size: 16px; color: var(--text);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .badge.orange { background: #fff3cd; color: #856404; }
    .badge.bleu   { background: #cce5ff; color: #004085; }
    .badge.vert   { background: #d4edda; color: #155724; }
    .badge.gris, .badge.rouge { background: #f8d7da; color: #721c24; }

    .commande-client-produits { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }

    .commande-client-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: var(--text-muted);
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .commande-client-total {
      font-family: 'Playfair Display', serif;
      font-weight: 700; color: var(--teal); font-size: 17px;
    }

    .code-confirmation-box {
      background: linear-gradient(135deg, #fff8e6, #fff3cd);
      border: 2px solid #ffd96a;
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-top: 12px;
      text-align: center;
    }
    .code-confirmation-box .cc-label { font-size: 12px; color: #856404; margin-bottom: 6px; font-weight: 700; }
    .code-confirmation-box .cc-code {
      font-size: 28px; font-weight: 700; color: #d63031;
      letter-spacing: 4px; font-family: 'Playfair Display', serif;
    }

    .btn-annuler-commande {
      background: #e74c3c;
      color: var(--white);
      border: none;
      padding: 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      margin-top: 12px;
      width: 100%;
      transition: background 0.2s;
      font-family: 'Lato', sans-serif;
    }
    .btn-annuler-commande:hover { background: #c0392b; }

    .delai-expire {
      text-align: center;
      margin-top: 12px;
      padding: 12px;
      background: #f8d7da;
      border-radius: var(--radius-sm);
      color: #721c24;
      font-weight: 700;
      font-size: 13px;
    }

    .aucune-commande {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .aucune-commande .icone { font-size: 48px; margin-bottom: 12px; }
    .aucune-commande p { font-size: 14px; margin-bottom: 10px; }
    .aucune-commande a {
      color: var(--teal);
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      margin-top: 6px;
    }
    .aucune-commande a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    .notif-toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--teal); color: var(--white);
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 700; z-index: 300;
      opacity: 0; transform: translateY(8px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    .notif-toast.show { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .profil-header { flex-direction: column; text-align: center; }
      .form-ligne { grid-template-columns: 1fr; }
      nav a:not(.btn-logout) { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="commande-client.html" class="logo-area">
        <img src="./images/logo.png" alt="Petit Délice" onerror="this.style.display='none'"/>
        <div class="logo-text">
          <span class="name">Petit Délice</span>
          <span class="tagline">Pâtisserie Artisanale</span>
        </div>
      </a>
      <nav>
        <a href="commande-client.html">🛍️ Commander</a>
        <button class="btn-logout" onclick="seDeconnecter()">🚪 Déconnexion</button>
      </nav>
    </div>
  </header>

  <main>

    <!-- HEADER PROFIL -->
    <div class="profil-header">
      <div class="avatar-grand">👤</div>
      <div class="profil-nom">
        <h1 id="profil-nom-affiche">Chargement...</h1>
        <p id="profil-email-affiche"></p>
        <span class="badge-client">👤 Client</span>
      </div>
    </div>

    <!-- INFORMATIONS PERSONNELLES -->
    <div class="section">
      <div class="section-title">✏️ Mes informations</div>
      <div class="succes" id="succes-profil">✅ Profil mis à jour !</div>

      <div class="form-ligne">
        <div class="form-groupe">
          <label>Nom complet</label>
          <input type="text" id="profil-nom" placeholder="Votre nom">
        </div>
        <div class="form-groupe">
          <label>Email</label>
          <input type="email" id="profil-email" placeholder="votre@email.com" disabled class="input-disabled">
        </div>
      </div>

      <div class="form-ligne">
        <div class="form-groupe">
          <label>Téléphone</label>
          <input type="tel" id="profil-telephone" placeholder="Ex: 06 12 34 56 78">
        </div>
        <div class="form-groupe">
          <label>Ville</label>
          <input type="text" id="profil-ville" placeholder="Ex: Marrakech">
        </div>
      </div>

      <div class="form-groupe">
        <label>Adresse de livraison par défaut</label>
        <input type="text" id="profil-adresse" placeholder="Ex: 12 Rue Hassan II, Marrakech">
      </div>

      <div class="sous-section">
        <div class="sous-section-title">🔒 Changer de mot de passe (optionnel)</div>
        <div class="form-groupe">
          <label>Nouveau mot de passe</label>
          <input type="password" id="profil-nouveau-mdp" placeholder="Laisser vide pour ne pas changer">
        </div>
      </div>

      <button class="btn-sauvegarder" onclick="sauvegarderProfil()">💾 Sauvegarder</button>
    </div>

    <!-- HISTORIQUE COMMANDES -->
    <div class="section">
      <div class="section-title">📋 Mes commandes</div>
      <div id="historique-commandes"></div>
    </div>

  </main>

  <div class="notif-toast" id="notif-toast"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="config.js"></script>
  <script>
// Utiliser les variables globales de config.js
const API = window.API
const socket = window.socket

let userClient = JSON.parse(sessionStorage.getItem("user"))
if (!userClient || userClient.role !== "client") {
  window.location.href = "login.html"
}

/* ─────────────────────────────────────────────────
   SOCKET.IO — Temps réel
───────────────────────────────────────────────── */
socket.on("rafraichir_historique", () => {
  console.log("🔄 Une commande a été mise à jour, rafraîchissement de l'historique…")
  chargerHistorique()
})

/* ─────────────────────────────────────────────────
   DÉCONNEXION
───────────────────────────────────────────────── */
function seDeconnecter() {
  sessionStorage.removeItem("user")
  window.location.href = "login.html"
}

/* ─────────────────────────────────────────────────
   CHARGER PROFIL
───────────────────────────────────────────────── */
async function chargerProfil() {
  try {
    const profil = await fetch(API + "/profil/" + userClient.id).then(r => r.json())

    document.getElementById("profil-nom-affiche").textContent   = profil.nom
    document.getElementById("profil-email-affiche").textContent = profil.email
    document.getElementById("profil-nom").value                 = profil.nom       || ""
    document.getElementById("profil-email").value               = profil.email     || ""
    document.getElementById("profil-telephone").value           = profil.telephone || ""
    document.getElementById("profil-adresse").value             = profil.adresse   || ""
    document.getElementById("profil-ville").value                = profil.ville     || ""
  } catch (err) {
    console.error("Erreur chargement profil:", err)
  }
}

/* ─────────────────────────────────────────────────
   SAUVEGARDER PROFIL
───────────────────────────────────────────────── */
async function sauvegarderProfil() {
  const data = {
    nom:         document.getElementById("profil-nom").value.trim(),
    telephone:   document.getElementById("profil-telephone").value.trim(),
    adresse:     document.getElementById("profil-adresse").value.trim(),
    ville:       document.getElementById("profil-ville").value.trim(),
    nouveau_mdp: document.getElementById("profil-nouveau-mdp").value
  }

  try {
    const res = await fetch(API + "/profil/" + userClient.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })

    const resultat = await res.json()

    if (!res.ok) {
      showToast("❌ Erreur : " + (resultat.erreur || "Erreur serveur"))
      return
    }

    const succes = document.getElementById("succes-profil")
    succes.style.display = "block"
    setTimeout(() => succes.style.display = "none", 3000)

    document.getElementById("profil-nouveau-mdp").value = ""
    document.getElementById("profil-nom-affiche").textContent = data.nom

    await chargerProfil()
  } catch (err) {
    console.error("❌ Erreur fetch:", err)
    showToast("❌ Erreur de connexion : " + err.message)
  }
}

/* ─────────────────────────────────────────────────
   HISTORIQUE COMMANDES
───────────────────────────────────────────────── */
async function chargerHistorique() {
  try {
    const commandes = await fetch(API + "/commandes/client/" + userClient.id).then(r => r.json())
    const div = document.getElementById("historique-commandes")

    if (commandes.length === 0) {
      div.innerHTML = `
        <div class="aucune-commande">
          <div class="icone">🛍️</div>
          <p>Vous n'avez pas encore passé de commande.</p>
          <a href="commande-client.html">Commander maintenant →</a>
        </div>`
      return
    }

    div.innerHTML = commandes.map(renderCarteCommande).join("")
  } catch (err) {
    console.error("Erreur historique:", err)
  }
}

function renderCarteCommande(cmd) {
  const total = cmd.produits
    ? cmd.produits.reduce((s, p) => s + Number(p.prix) * Number(p.quantite), 0)
    : 0
  const produitsList = cmd.produits
    ? cmd.produits.map(p => `${p.nom} ×${p.quantite}`).join(", ")
    : ""

  let statutPropre = (cmd.statut || "").trim()
  if (statutPropre.toLowerCase().startsWith("livr"))  statutPropre = "Livrée"
  if (statutPropre.toLowerCase().startsWith("annul")) statutPropre = "Annulée"

  const couleurs = { "En attente":"orange", "Confirmée":"bleu", "En préparation":"bleu", "Livrée":"vert", "Annulée":"rouge" }
  const couleur  = couleurs[statutPropre] || "orange"

  const livraison = cmd.livraison === "domicile" ? "🚚 Domicile" : "🏪 Retrait"
  const dateAffichee = cmd.date
    ? new Date(cmd.date).toLocaleDateString('fr-FR')
    : new Date(cmd.created_at).toLocaleDateString('fr-FR')

  // Code de confirmation
  let affichageCode = ""
  if (cmd.code_confirmation && !statutPropre.toLowerCase().startsWith("livr") && statutPropre !== "Annulée") {
    affichageCode = `
      <div class="code-confirmation-box">
        <div class="cc-label">🔑 Code de confirmation</div>
        <div class="cc-code">${cmd.code_confirmation}</div>
      </div>`
  }

  // Zone annulation
  let zoneAnnulation = ""
  if (cmd.statut === "En attente") {
    const dateCreation  = new Date(cmd.created_at || cmd.date)
    const maintenant    = new Date()
    const delaiMs       = maintenant - dateCreation
    const delaiMaxMs    = 90 * 1000 // 1 min 30
    const tempsRestantMs = delaiMaxMs - delaiMs

    if (tempsRestantMs > 0) {
      const minutes  = Math.floor(tempsRestantMs / 60000)
      const secondes = Math.floor((tempsRestantMs % 60000) / 1000)
      const tempsAffiche = `${minutes}:${secondes.toString().padStart(2, '0')}`

      zoneAnnulation = `
        <button class="btn-annuler-commande" data-id="${cmd.id}" onclick="annulerCommande(${cmd.id})">
          ❌ Annuler la commande (${tempsAffiche})
        </button>`
    } else {
      zoneAnnulation = `
        <div class="delai-expire">⏰ Délai d'annulation (1min30) dépassé</div>`
    }
  }

  return `
    <div class="carte-commande-client">
      <div class="commande-client-header">
        <strong>Commande #${cmd.id}</strong>
        <span class="badge ${couleur}">${statutPropre}</span>
      </div>
      <div class="commande-client-produits">${produitsList}</div>
      ${affichageCode}
      <div class="commande-client-footer">
        <span>${livraison} · 📅 ${dateAffichee}</span>
        <span class="commande-client-total">${total} DH</span>
      </div>
      ${zoneAnnulation}
    </div>`
}

/* ─────────────────────────────────────────────────
   ANNULER COMMANDE
───────────────────────────────────────────────── */
async function annulerCommande(id) {
  if (!confirm("⚠️ Êtes-vous sûr de vouloir annuler cette commande ? Cette action est irréversible.")) return

  try {
    const res = await fetch(API + "/commandes/" + id + "/annuler", {
      method: "PUT",
      headers: { "Content-Type": "application/json" }
    })

    const result = await res.json()

    if (!res.ok) {
      showToast("❌ " + (result.erreur || "Erreur lors de l'annulation"))
      return
    }

    showToast("✅ " + (result.message || "Commande annulée"))
    chargerHistorique()
  } catch (err) {
    showToast("❌ Erreur de connexion : " + err.message)
  }
}

/* ─────────────────────────────────────────────────
   COMPTE À REBOURS (annulation)
───────────────────────────────────────────────── */
setInterval(() => {
  const boutons = document.querySelectorAll('.btn-annuler-commande')
  boutons.forEach(btn => {
    const texte = btn.textContent
    const match = texte.match(/\((\d+):(\d+)\)/)
    if (!match) return

    let minutes  = parseInt(match[1])
    let secondes = parseInt(match[2])

    if (secondes > 0) {
      secondes--
    } else if (minutes > 0) {
      minutes--
      secondes = 59
    } else {
      chargerHistorique() // Temps écoulé : on recharge pour afficher "Délai dépassé"
      return
    }

    btn.textContent = `❌ Annuler la commande (${minutes}:${secondes.toString().padStart(2, '0')})`
  })
}, 1000)

/* ─────────────────────────────────────────────────
   TOAST NOTIFICATION
───────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('notif-toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3500)
}

/* ─────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────── */
chargerProfil()
chargerHistorique()

</script>

</body>
</html>
