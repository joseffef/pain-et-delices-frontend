<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petit Délices — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo .icone { font-size: 50px; display: block; margin-bottom: 10px; }
    .login-logo h1 { color: #8B4513; font-size: 22px; }
    .login-logo p { color: #999; font-size: 13px; margin-top: 4px; }

    .form-groupe { margin-bottom: 18px; }
    .form-groupe label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    .form-groupe input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-groupe input:focus {
      outline: none;
      border-color: #8B4513;
    }

    .btn-login {
      width: 100%;
      background: #8B4513;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      margin-top: 6px;
    }
    .btn-login:hover { background: #7a3a10; }

    .erreur {
      background: #f8d7da;
      color: #721c24;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .chargement {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: 14px;
      display: none;
    }

    .separateur {
      text-align: center;
      color: #ccc;
      margin: 20px 0;
      font-size: 13px;
      position: relative;
    }
    .separateur::before, .separateur::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #eee;
    }
    .separateur::before { left: 0; }
    .separateur::after  { right: 0; }

    .lien-inscription {
      text-align: center;
      font-size: 13px;
      color: #888;
    }
    .lien-inscription a {
      color: #8B4513;
      text-decoration: none;
      font-weight: 500;
    }
    .lien-inscription a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
<img src="./images/logo.png" alt="Logo" class="logo-img" style="margin: 0; max-width: 100px;">
      <h1>Petit Délices</h1>
      <p>Connectez-vous à votre espace</p>
    </div>

    <div class="erreur" id="erreur"></div>

    <div class="form-groupe">
      <label>Email</label>
      <input type="email" id="email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter') seConnecter()">
    </div>

    <div class="form-groupe">
      <label>Mot de passe</label>
      <input type="password" id="motdepasse" placeholder="••••••••" onkeydown="if(event.key==='Enter') seConnecter()">
    </div>

    <button class="btn-login" onclick="seConnecter()">🔐 Se connecter</button>

    <div class="chargement" id="chargement">Connexion en cours...</div>

    <div class="separateur">ou</div>

    <div class="lien-inscription">
      Pas encore de compte ? 
      <a href="inscription.html" style="color:#8B4513; font-weight:500; text-decoration:none">
    Créer un compte →
  </a>
    </div>
  </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="config.js"></script>

  <script>
    // Utiliser les variables globales de config.js
const API = window.API;
const socket = window.socket;

    // Fonctions déclarées AVANT la vérification de session
    function redirigerSelonRole(role) {
      let pages = {
        "admin":   "pages/dashboard.html",
        "chef":    "pages/chef.html",
        "achat":   "pages/achat.html",
        "livreur": "pages/livreur.html",
        "caissier": "caissier.html",
        "client":  "commande-client.html"
      }
      window.location.href = pages[role] || "login.html"
    }

    async function seConnecter() {
      let email      = document.getElementById("email").value.trim()
      let motdepasse = document.getElementById("motdepasse").value.trim()
      let erreurDiv  = document.getElementById("erreur")
      let chargement = document.getElementById("chargement")

      erreurDiv.style.display = "none"

      if (!email || !motdepasse) {
        erreurDiv.textContent = "Veuillez remplir tous les champs !"
        erreurDiv.style.display = "block"
        return
      }

      chargement.style.display = "block"

      try {
        let response = await fetch(API + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, mot_de_passe: motdepasse })
        })

        let data = await response.json()
        chargement.style.display = "none"

        if (!response.ok) {
          erreurDiv.textContent = data.erreur || "Erreur de connexion"
          erreurDiv.style.display = "block"
          return
        }

        sessionStorage.setItem("user", JSON.stringify(data))
        redirigerSelonRole(data.role)

      } catch(err) {
        chargement.style.display = "none"
        erreurDiv.textContent = "Impossible de contacter le serveur"
        erreurDiv.style.display = "block"
      }
    }

    // Vérification APRÈS les déclarations de fonctions
    let userConnecte = JSON.parse(sessionStorage.getItem("user"))
    if (userConnecte) redirigerSelonRole(userConnecte.role)
  </script>

</body>
</html>
