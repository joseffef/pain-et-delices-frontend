<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petit Délices — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #1B5E6E;
      --teal-dark: #134752;
      --gold: #D4A055;
      --gold-dark: #B8843E;
      --cream: #F5E6C8;
      --bg: #FAFAF7;
      --text: #2C2C2C;
      --muted: #8A8A8A;
      --rouge: #D9534F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: white;
      border-radius: 18px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 30px rgba(27,94,110,0.12);
    }

    .login-logo { text-align: center; margin-bottom: 30px; }
    .login-logo .logo-img {
      max-width: 90px;
      height: auto;
      display: block;
      margin: 0 auto 14px auto;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      color: var(--teal-dark);
      font-size: 23px;
      font-weight: 700;
    }
    .login-logo p { color: var(--muted); font-size: 13px; margin-top: 6px; }

    .form-groupe { margin-bottom: 18px; }
    .form-groupe label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .form-groupe input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--cream);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }
    .form-groupe input:focus {
      outline: none;
      border-color: var(--gold);
      background: white;
    }

    .btn-login {
      width: 100%;
      background: var(--teal);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      margin-top: 6px;
    }
    .btn-login:hover { background: var(--teal-dark); }

    .erreur {
      background: rgba(217,83,79,0.12);
      color: var(--rouge);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      font-weight: 600;
    }

    .chargement {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 14px;
      display: none;
    }

    .separateur {
      text-align: center;
      color: var(--cream);
      margin: 22px 0;
      font-size: 13px;
      position: relative;
    }
    .separateur::before, .separateur::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--cream);
    }
    .separateur::before { left: 0; }
    .separateur::after  { right: 0; }

    .lien-inscription {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .lien-inscription a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 700;
    }
    .lien-inscription a:hover { text-decoration: underline; color: var(--teal-dark); }

    /* ✅ RESPONSIVE */
    @media (max-width: 420px) {
      .login-box { padding: 28px 22px; border-radius: 14px; }
      .login-logo .logo-img { max-width: 72px; }
      .login-logo h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <img src="./images/logo.png" alt="Logo" class="logo-img">
      <h1>Petit Délices</h1>
      <p>Connectez-vous à votre espace</p>
    </div>

    <div class="erreur" id="erreur"></div>

    <div class="form-groupe">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter') seConnecter()">
    </div>

    <div class="form-groupe">
      <label for="motdepasse">Mot de passe</label>
      <input type="password" id="motdepasse" placeholder="••••••••" onkeydown="if(event.key==='Enter') seConnecter()">
    </div>

    <button class="btn-login" onclick="seConnecter()">🔐 Se connecter</button>

    <div class="chargement" id="chargement">Connexion en cours...</div>

    <div class="separateur">ou</div>

    <div class="lien-inscription">
      Pas encore de compte ?
      <a href="inscription.html">Créer un compte →</a>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="config.js"></script>

  <script>
    // Utiliser les variables globales de config.js
    const API = window.API;
    const socket = window.socket;

    // Fonctions déclarées AVANT la vérification de session
    function redirigerSelonRole(role) {
      let pages = {
        "admin":   "pages/dashboard.html",
        "chef":    "pages/chef.html",
        "achat":   "pages/achat.html",
        "livreur": "pages/livreur.html",
        "caissier": "caissier.html",
        "client":  "commande-client.html"
      }
      window.location.href = pages[role] || "login.html"
    }

    async function seConnecter() {
      let email      = document.getElementById("email").value.trim()
      let motdepasse = document.getElementById("motdepasse").value.trim()
      let erreurDiv  = document.getElementById("erreur")
      let chargement = document.getElementById("chargement")

      erreurDiv.style.display = "none"

      if (!email || !motdepasse) {
        erreurDiv.textContent = "Veuillez remplir tous les champs !"
        erreurDiv.style.display = "block"
        return
      }

      chargement.style.display = "block"

      try {
        let response = await fetch(API + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, mot_de_passe: motdepasse })
        })

        let data = await response.json()
        chargement.style.display = "none"

        if (!response.ok) {
          erreurDiv.textContent = data.erreur || "Erreur de connexion"
          erreurDiv.style.display = "block"
          return
        }

        sessionStorage.setItem("user", JSON.stringify(data))
        redirigerSelonRole(data.role)

      } catch(err) {
        chargement.style.display = "none"
        erreurDiv.textContent = "Impossible de contacter le serveur"
        erreurDiv.style.display = "block"
      }
    }

    // Vérification APRÈS les déclarations de fonctions
    let userConnecte = JSON.parse(sessionStorage.getItem("user"))
    if (userConnecte) redirigerSelonRole(userConnecte.role)
  </script>

</body>
</html>
