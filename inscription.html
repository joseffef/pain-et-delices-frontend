<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petit Délices — Inscription</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo span { font-size: 50px; display: block; margin-bottom: 10px; }
    .logo h1 { color: #8B4513; font-size: 22px; }
    .logo p { color: #999; font-size: 13px; margin-top: 4px; }

    .form-groupe { margin-bottom: 16px; }
    .form-groupe label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    .form-groupe input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-groupe input:focus {
      outline: none;
      border-color: #8B4513;
    }

    .btn {
      width: 100%;
      background: #8B4513;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .btn:hover { background: #7a3a10; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .erreur {
      background: #f8d7da;
      color: #721c24;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .succes {
      background: #d4edda;
      color: #155724;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .separateur {
      text-align: center;
      color: #ccc;
      margin: 20px 0;
      font-size: 13px;
      position: relative;
    }
    .separateur::before, .separateur::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #eee;
    }
    .separateur::before { left: 0; }
    .separateur::after  { right: 0; }

    .lien-login {
      text-align: center;
      font-size: 13px;
      color: #888;
    }
    .lien-login a {
      color: #8B4513;
      text-decoration: none;
      font-weight: 500;
    }
    .lien-login a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="box">
    <div class="logo">
<img src="./images/logo.png" alt="Logo" class="logo-img" style="margin: 0; max-width: 100px;">
      <h1>Petit Délices</h1>
      <p>Créez votre compte pour commander</p>
    </div>

    <div class="erreur" id="erreur"></div>
    <div class="succes" id="succes"></div>

    <div class="form-groupe">
      <label>Nom complet *</label>
      <input type="text" id="nom" placeholder="Ex: Mohamed Alami">
    </div>

    <div class="form-groupe">
      <label>Email *</label>
      <input type="email" id="email" placeholder="votre@email.com">
    </div>

    <div class="form-groupe">
      <label>Mot de passe * (6 caractères minimum)</label>
      <input type="password" id="mdp" placeholder="••••••••">
    </div>

    <div class="form-groupe">
      <label>Confirmer le mot de passe *</label>
      <input type="password" id="mdp2" placeholder="••••••••" onkeydown="if(event.key==='Enter') sInscrire()">
    </div>

    <button class="btn" id="btn-inscription" onclick="sInscrire()">✅ Créer mon compte</button>

    <div class="separateur">ou</div>

    <div class="lien-login">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>
  </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="config.js"></script>

  <script>
    // Utiliser les variables globales de config.js
const API = window.API;
const socket = window.socket;

    // Si déjà connecté en tant que client, rediriger directement
    let userExistant = JSON.parse(sessionStorage.getItem("user"))
    if (userExistant && userExistant.role === "client") {
      window.location.href = "commande-client.html"
    }
    // Fonction pour afficher/masquer l'ICE
  function toggleIce() {
    let type = document.querySelector('input[name="type_client"]:checked').value;
    document.getElementById("bloc-ice").style.display = type === "entreprise" ? "block" : "none";
  }
    async function sInscrire() {
      let nom   = document.getElementById("nom").value.trim()
      let email = document.getElementById("email").value.trim()
      let mdp   = document.getElementById("mdp").value.trim()
      let mdp2  = document.getElementById("mdp2").value.trim()

      let erreurDiv = document.getElementById("erreur")
      let succesDiv = document.getElementById("succes")
      let btn       = document.getElementById("btn-inscription")

      erreurDiv.style.display = "none"
      succesDiv.style.display = "none"


      if (!nom || !email || !mdp || !mdp2) {
        erreurDiv.textContent = "Veuillez remplir tous les champs !"
        erreurDiv.style.display = "block"
        return
      }

      if (mdp !== mdp2) {
        erreurDiv.textContent = "Les mots de passe ne correspondent pas !"
        erreurDiv.style.display = "block"
        return
      }

      if (mdp.length < 6) {
        erreurDiv.textContent = "Le mot de passe doit contenir au moins 6 caractères !"
        erreurDiv.style.display = "block"
        return
      }

      btn.disabled = true
      btn.textContent = "Création en cours..."

      try {
  let response = await fetch(API + "/auth/inscription", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    // ✅ AJOUTER ice ET type_client
    body: JSON.stringify({ 
      nom, 
      email, 
      mot_de_passe: mdp
    })
  })

  let data = await response.json()

  if (!response.ok) {
    erreurDiv.textContent = data.erreur || "Erreur lors de l'inscription"
    erreurDiv.style.display = "block"
    btn.disabled = false
    btn.textContent = "✅ Créer mon compte"
    return
  }

  // Connexion automatique après inscription
  sessionStorage.setItem("user", JSON.stringify(data))
  succesDiv.textContent = "✅ Compte créé ! Redirection vers la boutique..."
  succesDiv.style.display = "block"

  setTimeout(() => {
  // ✅ Recharger les données utilisateur depuis le serveur
  fetch(API + "/profil/" + data.id)
    .then(r => r.json())
    .then(profil => {
      // Mettre à jour sessionStorage avec les vraies données
      data.ice = profil.ice
      data.type_client = profil.type_client
      sessionStorage.setItem("user", JSON.stringify(data))
      window.location.href = "commande-client.html"
    })
    .catch(() => {
      window.location.href = "commande-client.html"
    })
}, 1200)

} catch(err) {
  erreurDiv.textContent = "Impossible de contacter le serveur"
  erreurDiv.style.display = "block"
  btn.disabled = false
  btn.textContent = "✅ Créer mon compte"
}
    }
  </script>

</body>
</html>
